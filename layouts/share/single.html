{{- define "main" -}}
<!--
  /share — UTM-tracked redirect endpoint per linkedin_referral_mechanism_test
  cycle 1 CONTRACT_CHANGE C1. Plausible auto-fires pageview on load with UTM
  params captured. Page then JS-redirects to the `dest` query param (or shows
  a manual fallback if absent or unsafe).

  Allowed `dest` shape (security-bound):
    - LinkedIn share dialog:  https://www.linkedin.com/sharing/share-offsite/?url=<encoded>
    - LinkedIn newsletter:    https://www.linkedin.com/newsletters/<id>
    - rexcoleman.dev / *.rexcoleman.dev (own domain)
  Open redirects to arbitrary destinations are NOT permitted.
-->

<!--
  Visible body kept minimal + blank-toned so the in-flight redirect feels
  native rather than interstitial. If the redirect fails (JS disabled,
  unsupported browser), the fallback text + link below still resolves the
  click to a useful destination.
-->
<div class="post-single" style="text-align:center; padding: 4em 1em; opacity: 0;">
  <p>
    <a href="https://www.linkedin.com/in/rexcoleman/recent-activity/newsletters/">Continue to the newsletter →</a>
  </p>
</div>

<script>
(function () {
  var qs = new URLSearchParams(window.location.search);
  var raw = qs.get('dest') || '';
  var allowed = false;
  var target = '';

  try {
    if (raw) {
      var u = new URL(raw, window.location.origin);
      if (
        (u.hostname === 'www.linkedin.com' || u.hostname === 'linkedin.com')
        || u.hostname === 'rexcoleman.dev'
        || u.hostname.endsWith('.rexcoleman.dev')
      ) {
        allowed = true;
        target = u.toString();
      }
    }
  } catch (e) { /* malformed URL → fall through to default */ }

  if (!allowed) {
    target = 'https://www.linkedin.com/in/rexcoleman/recent-activity/newsletters/';
  }

  // 50ms — enough for Plausible queue to flush, not enough to perceive
  setTimeout(function () { window.location.replace(target); }, 50);
})();
</script>
{{- end -}}
