baseURL: "https://rexcoleman.dev/"
languageCode: "en-us"
title: "Rex Coleman"
theme: "PaperMod"

params:
  env: production
  description: "Building AI security systems across the full ML stack. Adversarial control analysis applied to 6 security domains. Georgia Tech OMSCS (ML specialization). Creator of govML."
  author: "Rex Coleman"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  comments: false

  profileMode:
    enabled: true
    title: "Rex Coleman"
    subtitle: "Building AI systems that survive adversaries."
    imageUrl: ""
    imageTitle: ""
    buttons:
      - name: Posts
        url: /posts/
      - name: Projects
        url: /projects/

  homeInfoParams:
    Title: "Building AI systems that survive adversaries."
    Content: >
      AI + cybersecurity at the intersection of 4 ML paradigms.
      7 projects shipped. Open-source governance via [govML](https://github.com/rexcoleman/govML).
      Georgia Tech OMSCS (Machine Learning). CFA charterholder.

  socialIcons:
    - name: github
      url: "https://github.com/rexcoleman"
    - name: linkedin
      url: "https://linkedin.com/in/rexcoleman"
    - name: rss
      url: "/index.xml"

  cover:
    linkFullImages: true
    hidden: true

  editPost:
    disabled: true

  assets:
    favicon: ""
    disableFingerprinting: false

menu:
  main:
    - name: Posts
      url: /posts/
      weight: 10
    - name: Projects
      url: /projects/
      weight: 20
    - name: Now
      url: /now/
      weight: 30
    - name: About
      url: /about/
      weight: 40
    - name: Search
      url: /search/
      weight: 50

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: monokai
  goldmark:
    renderer:
      unsafe: true

sitemap:
  changefreq: weekly
  priority: 0.5
