baseURL: "https://rexcoleman.dev/"
languageCode: "en-us"
title: "Rex Coleman"
theme: "PaperMod"

params:
  env: production
  description: "Securing AI from the architecture up. Research, tools, and methodology for AI security. Creator of govML."
  author: "Rex Coleman"
  defaultTheme: dark
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  comments: false

  profileMode:
    enabled: false

  homeInfoParams:
    Title: "Securing AI From The Architecture Up"
    Content: ""

  socialIcons:
    - name: github
      url: "https://github.com/rexcoleman"
    - name: linkedin
      url: "https://linkedin.com/in/rexcoleman"
    - name: rss
      url: "/index.xml"

  images:
    - /images/og-default.png

  cover:
    linkFullImages: true
    hidden: true

  editPost:
    disabled: true

  assets:
    favicon: "/images/favicon-32.png"
    disableFingerprinting: false

menu:
  main:
    - name: Projects
      url: /projects/
      weight: 10
    - name: About
      url: /about/
      weight: 20
    - name: Now
      url: /now/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: monokai
  goldmark:
    renderer:
      unsafe: true

sitemap:
  changefreq: weekly
  priority: 0.5
