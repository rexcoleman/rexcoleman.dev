baseURL: "https://rexcoleman.dev/"
languageCode: "en-us"
title: "Rex Coleman"
theme: "PaperMod"

params:
  env: production
  description: "AI + cybersecurity. Building what's missing between ML research and production security. 9 open-source projects, 4 ML paradigms. Creator of govML."
  author: "Rex Coleman"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  comments: false

  profileMode:
    enabled: true
    title: "Rex Coleman"
    subtitle: "Building what's missing between ML research and production security."
    imageUrl: ""
    imageTitle: ""
    buttons:
      - name: Posts
        url: /posts/
      - name: Projects
        url: /projects/

  homeInfoParams:
    Title: "Building what's missing between ML research and production security."
    Content: >
      9 open-source projects across 4 ML paradigms (RL, unsupervised, supervised, optimization).
      Adversarial control analysis applied to agent security, model integrity, and network defense.
      [govML](https://github.com/rexcoleman/govML) — the governance framework that enforces reproducibility across all of it.
      MSCS Georgia Tech (ML). CFA. CISSP.

  socialIcons:
    - name: github
      url: "https://github.com/rexcoleman"
    - name: linkedin
      url: "https://linkedin.com/in/rexcoleman"
    - name: rss
      url: "/index.xml"

  cover:
    linkFullImages: true
    hidden: true

  editPost:
    disabled: true

  assets:
    favicon: ""
    disableFingerprinting: false

menu:
  main:
    - name: Posts
      url: /posts/
      weight: 10
    - name: Projects
      url: /projects/
      weight: 20
    - name: Now
      url: /now/
      weight: 30
    - name: About
      url: /about/
      weight: 40
    - name: Search
      url: /search/
      weight: 50

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: monokai
  goldmark:
    renderer:
      unsafe: true

sitemap:
  changefreq: weekly
  priority: 0.5
