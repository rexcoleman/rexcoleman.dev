baseURL: "https://rexcoleman.dev/"
languageCode: "en-us"
title: "Rex Coleman"
theme: "PaperMod"

params:
  env: production
  description: "Securing AI from the architecture up. Research, tools, and methodology for AI security. Creator of govML."
  author: "Rex Coleman"
  defaultTheme: dark
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  comments: false

  mainSections: ["posts"]

  profileMode:
    enabled: true
    title: "Rex Coleman"
    subtitle: "Securing AI from the architecture up."
    imageUrl: "/images/profile.jpg"
    imageTitle: "Rex Coleman"
    imageWidth: 160
    imageHeight: 160
    buttons:
      - name: Blog
        url: /posts/
      - name: Projects
        url: /projects/
      - name: About
        url: /about/

  socialIcons:
    - name: github
      url: "https://github.com/rexcoleman"
    - name: linkedin
      url: "https://linkedin.com/in/rexcoleman"
    - name: email
      url: "mailto:rex@singularitycyber.com"
    - name: substack
      url: "https://substack.com/@rexcoleman"
    - name: rss
      url: "/index.xml"

  images:
    - /images/og-default.png

  cover:
    linkFullImages: true
    hidden: true

  editPost:
    disabled: true

  assets:
    favicon: "/images/favicon-32.png"
    disableFingerprinting: false

menu:
  main:
    - name: Blog
      url: /posts/
      weight: 5
    - name: Projects
      url: /projects/
      weight: 10
    - name: About
      url: /about/
      weight: 20

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: monokai
  goldmark:
    renderer:
      unsafe: true

taxonomies:
  category: categories
  tag: tags

sitemap:
  changefreq: weekly
  priority: 0.5
